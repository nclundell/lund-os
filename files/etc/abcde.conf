# ---------- Metadata ----------
CDDBMETHOD=musicbrainz
CDDISCID=cd-discid

# ---------- Ripping ----------
CDROMREADERSYNTAX=libcdio

# ---------- Encoders ----------
OGGENCODERSYNTAX=oggenc
MP3ENCODERSYNTAX=lame
FLACENCODERSYNTAX=flac
OPUSENCODERSYNTAX=opusenc

OGGENC=oggenc
LAME=lame
FLAC=flac
OPUSENC=opusenc

OGGENCOPTS='-q 8'
LAMEOPTS='-V 0'
FLACOPTS='-s -e -V -8'
OPUSENCOPTS='--vbr --bitrate 128'

# ---------- Output Formats ----------
OUTPUTTYPE=ogg

# ---------- Actions ----------
ACTIONS=cddb,read,encode,tag,move,clean

# ---------- Output Location ----------
OUTPUTDIR="$HOME/Music"

# Standard albums
OUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}/${TRACKNUM} ${TRACKFILE}'

# Various Artists albums
VAOUTPUTFORMAT='Various/${ALBUMFILE}/${TRACKNUM} ${ARTISTFILE} - ${TRACKFILE}'

# Single-track releases
ONETRACKOUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}/${ALBUMFILE}'
VAONETRACKOUTPUTFORMAT='Various/${ALBUMFILE}/${ALBUMFILE}'

# ---------- Filename cleanup ----------
mungefilename ()
{
  echo "$@" | sed -e 's/^\.*//' | tr -d ':><|*/"?[:cntrl:]'
}

# ---------- Misc ----------
LOWDISK=y
PADTRACKS=y
MAXPROCS=$(nproc --ignore=2)
EXTRAVERBOSE=2
EJECTCD=y
