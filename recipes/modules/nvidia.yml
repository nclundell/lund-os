# yaml-language-server: $schema=https://schema.blue-build.org/modules/dnf-latest.json

# Module: NVIDIA
# NVIDIA-specific packages for gaming and Wayland support

type: dnf
repos:
  files:
    - https://negativo17.org/repos/fedora-nvidia-580.repo
  cleanup: true
install:
  packages:
    - nvidia-driver-libs.i686
    - nvidia-driver-cuda-libs.i686
    - egl-wayland.x86_64
    - egl-wayland.i686
