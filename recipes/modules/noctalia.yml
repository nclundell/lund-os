# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Noctalia shell module
# Installs shell packages and overrides /etc/niri fragments provided by modules/niri.yml.
# Include after modules/niri.yml, and do not combine with modules/dms.yml in the same recipe.

modules:
  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      cleanup: true
    install:
      packages:
        - cava
        - cliphist
        - ddcutil
        - ghostty
        - matugen
        - noctalia-shell
        - wlsunset
    remove:
      packages:
        - alacritty
        - fuzzel
        - swaylock
        - waybar

  - type: files
    files:
      - source: noctalia
        destination: /
