# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      cleanup: true
    install:
      packages:
        - cliphist
        - ddcutil
        - ghostty
        - matugen
        - noctalia-shell
        - wlsunset

  - type: files
    files:
      - source: noctalia
        destination: /
