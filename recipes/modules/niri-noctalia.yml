# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Module: niri-noctalia
# Niri wayland compositor with the noctalia shell

modules:
  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      cleanup: true
    install:
      packages:
        - cava
        - cliphist
        - ddcutil
        - ghostty
        - matugen
        - niri
        - noctalia-shell
        - wl-clipboard
        - wl-mirror
        - wlr-randr
        - wlsunset
    remove:
      packages:
        - alacritty
        - fuzzel
        - swaylock
        - waybar

  - type: files
    files:
      - source: niri-noctalia
        destination: /
