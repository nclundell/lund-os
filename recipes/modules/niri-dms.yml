# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Module: niri-dms
# Niri wayland compositor with the dank material shell

modules:
  - type: dnf
    repos:
      copr:
        - avengemedia/dms
        - avengemedia/danklinux
        - yalter/niri
      cleanup: true
    install:
      packages:
        - cava
        - cliphist
        - dms
        - ghostty
        - matugen
        - material-symbols-fonts
        - niri
        - qt6-qtmultimedia
        - quickshell
    remove:
      packages:
        - alacritty
        - fuzzel
        - swaylock
        - waybar

  - type: files
    files:
      - source: niri-dms
        destination: /
