# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Module: Niri
# Niri window manager and shared /etc/niri fragment defaults.
# Shell selection is recipe-level: include exactly one shell module after this one.

modules:
  - type: dnf
    repos:
      copr:
        - yalter/niri
    install:
      packages:
        - niri
        - wl-clipboard
        - wl-mirror
        - wlr-randr

  - type: files
    files:
      - source: niri
        destination: /
