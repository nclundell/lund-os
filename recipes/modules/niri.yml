# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Module: niri-noctalia
# Niri wayland compositor with the noctalia shell

modules:
  - type: dnf
    repos:
      copr:
        - scottames/ghostty
      cleanup: true
    install:
      packages:
        - cava
        - cliphist
        - ddcutil
        - fastfetch
        - ghostty
        - matugen
        - niri
        - noctalia
        - wl-clipboard
        - wl-mirror
        - wlr-randr
        - wlsunset
    remove:
      packages:
        - alacritty
        - fuzzel
        - swaylock
        - waybar
