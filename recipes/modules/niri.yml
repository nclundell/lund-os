# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Module: Niri
# Niri window manager and related packages

modules:
  - type: dnf
    repos:
      copr:
        - yalter/niri
    install:
      packages:
        - cava
        - niri
        - wl-clipboard
        - wl-mirror
        - wlr-randr

  - from-file: modules/noctalia.yml
