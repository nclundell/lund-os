# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      copr:
        - avengemedia/dms
        - avengemedia/danklinux
    install:
      packages:
        - cliphist
        - dms
        - ghostty
        - quickshell
        - material-symbols-fonts

  - type: files
    files:
      - source: dms
        destination: /
