# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# DMS shell module
# Installs shell packages and overrides /etc/niri fragments provided by modules/niri.yml.
# Include after modules/niri.yml, and do not combine with modules/noctalia.yml in the same recipe.

modules:
  - type: dnf
    repos:
      copr:
        - avengemedia/dms
        - avengemedia/danklinux
    install:
      packages:
        - cava
        - cliphist
        - ddcutil
        - dms
        - ghostty
        - material-symbols-fonts
        - matugen
        - quickshell
    remove:
      packages:
        - alacritty
        - fuzzel
        - swaylock
        - waybar

  - type: files
    files:
      - source: dms
        destination: /
