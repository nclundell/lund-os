# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  # Negativo17 Packages
  - type: dnf
    repos:
      nonfree: negativo17
      cleanup: true
    install:
      packages:
        - HandBrake-gui
        - HandBrake-cli
        - libdvdcss
        - lame

  # RPM Fusion Packages
  - type: dnf
    repos:
      nonfree: rpmfusion
      cleanup: true
    install:
      packages:
        - mpd
        - mpdris2
        - ncmpcpp

  # Fedora Standard Repo Packages
  - type: dnf
    install:
      packages:
        - abcde
        - cd-discid
        - flac
        - libcdio-paranoia
        - libdiscid
        - libldac
        - opus-tools
        - vorbis-tools
