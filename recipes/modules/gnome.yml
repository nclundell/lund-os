# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  # Module: GNOME Core
  # Core GNOME packages and removals
  - type: dnf
    install:
      packages:
        - gnome-menus
        - lm_sensors

  # Module: GNOME Extensions
  # GNOME Shell extensions to install
  - type: gnome-extensions
    install:
      - 615  # AppIndicators/System Tray
      - 3628 # Arc Menu
      - 3193 # Blur My Shell
      - 1160 # Dash to Panel
      - 3843 # Just Perfection
      - 6099 # PaperWM
      - 1460 # Vitals
      - 5470 # Weather O'Clock
      - 4228 # Wireless HID

  # Module: GNOME Flatpaks
  # GNOME-related Flatpak applications
  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          title: Flathub
        install:
          # Official Apps
          - org.gnome.baobab                     # Disk Usage Analyzer
          - org.gnome.Calendar                   # Calendar
          - org.gnome.Calculator                 # Calculator
          - org.gnome.Loupe                      # Image Viewer
          - org.gnome.Papers                     # Papers Document Viewer
          - org.gnome.SimpleScan                 # Scanner
          - org.gnome.TextEditor                 # Text Editor
          - org.gnome.Weather                    # Weather
          # Unofficial Apps
          - com.mattjakeman.ExtensionManager     # Extension Manager
          - org.altlinux.Tuner                   # Tuner
      
