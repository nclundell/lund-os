# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: systemd
    system:
      masked:
        - rpm-ostreed-automatic.timer
      enabled:
        - bootc-fetch-apply-updates.timer

  - type: justfiles
    install: true

  - type: files
    files:
      - source: etc 
        destination: /etc

  - type: containerfile
    snippets:
      - COPY --link files/usr/local/bin/* /usr/local/bin/
      - RUN chmod 755 /usr/local/bin/build-makemkv
      - RUN chmod 755 /usr/local/bin/uninstall-makemkv
      - RUN chmod 755 /usr/local/bin/extract

  - type: os-release
    properties:
      NAME: lundos
      ID: lundos
      ID_LIKE: fedora
      PRETTY_NAME: LundOS (Custom Fedora Atomic)
      DEFAULT_HOSTNAME: lundos
      HOME_URL: https://github.com/nclundell/lund-os
