# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: systemd
    system:
      masked:
        - rpm-ostreed-automatic.timer
      enabled:
        - bootc-fetch-apply-updates.timer
    user:
      enabled:
        - flatpak-system-update.timer

  - type: justfiles
    install: true

  - type: files
    files:
      - source: etc 
        destination: /etc
      - source: lib
        destination: /usr/lib
      - source: share
        destination: /usr/share
      - source: usr/local/bin
        destination: /usr/local/bin
      - source: etc/skel
        destination: /etc/skel

  - type: os-release
    properties:
      NAME: lundos
      ID: lundos
      ID_LIKE: fedora
      PRETTY_NAME: LundOS (Custom Fedora Atomic)
      DEFAULT_HOSTNAME: lundos
      HOME_URL: https://github.com/nclundell/lund-os
