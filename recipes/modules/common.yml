# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  # ============================================================================
  # Module 1: Fedora Main Repos
  # Standard Fedora packages from default repositories
  # ============================================================================
  - type: dnf
    install:
      packages:
        # Core Tools
        - curl
        - git
        - jq
        - ripgrep
        - stow
        - tmux
        - unzip
        - wget
        - xz
        # CLI Tools
        - abcde
        - atuin
        - bash-completion
        - bat
        - cabextract
        - fd-find
        - fzf
        - git-delta
        - glow
        - gh
        - just
        - neovim
        - openssh
        - p7zip
        - pandoc
        - poppler-utils
        - shellcheck
        - sshfs
        - sqlite
        - tree-sitter-cli
        - w3m
        - zoxide
        # Additional
        - ImageMagick
        - ncmpcpp
        # Build Dependencies
        - autoconf
        - bzip2
        - gcc
        - gdbm-devel
        - libffi-devel
        - libyaml-devel
        - ncurses-devel
        - openssl-devel
        - patch
        - perl-FindBin
        - readline-devel
        - rust
        # Fonts
        - google-roboto-fonts
        # Icons
        - adwaita-icon-theme
        - breeze-icon-theme
        - papirus-icon-theme
        - yaru-icon-theme
        # Printer
        - avahi
        - bluez-cups
        - cups
        - cups-browsed
        - cups-filters
        - foomatic
        - foomatic-db
        - gutenprint-cups
        - nss-mdns
        # System
        - tuned
        - tuned-ppd
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # ============================================================================
  # Module 2: COPR Repositories
  # Community-maintained packages from COPR (ublue-os/packages, nclundell/fedora-extras)
  # ============================================================================
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
        - nclundell/fedora-extras
    install:
      packages:
        - bottom
        - eza
        - lazydocker
        - lazygit
        - resvg
        - starship
        - uupd
        - yazi

  # ============================================================================
  # Module 3: Negativo17 Repository
  # Non-free packages from negativo17 COPR (cdda2wav for CD ripping)
  # ============================================================================
  - type: dnf
    repos:
      nonfree: negativo17
    install:
      packages:
        - cdda2wav
        - cdrecord
        - mkisofs

  # ============================================================================
  # Module 4: RPM Fusion Repository
  # Non-free packages from RPM Fusion (lame, mpd for audio)
  # ============================================================================
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      packages:
        - lame
        - mpd

  - type: fonts
    fonts:
      nerd-fonts:
        - AdwaitaMono
        # - CaskaydiaCove
        - FiraCode
        - Hack
        - Inconsolata
        - JetBrainsMono

  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          title: Flathub (user)
      - scope: system
        notify: false
        repo:
          title: Flathub (system)
        install:
          - com.usebottles.bottles       # Bottles
          - io.github.kolunmi.Bazaar     # Bazaar Flatpak Manager
          - io.github.diegopvlk.Cine     # Cine
          - com.brave.Browser            # Brave Browser
          - com.ranfdev.DistroShelf      # DistroShelf
          - com.github.tchx84.Flatseal   # Flatseal
          - one.ablaze.floorp            # Floorp Browser
