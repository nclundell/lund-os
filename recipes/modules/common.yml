# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      packages:
        - abcde
        - cabextract
        - flac
        - git
        - icedax
        - ImageMagick
        - lame
        - libdiscid
        - mpd
        - ncmpcpp
        - opus-tools
        - p7zip
        - papirus-icon-theme
        - stow
        - unrar
        - unzip
        - vorbis-tools
        - yaru-icon-theme
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: fonts
    fonts:
      nerd-fonts:
        - AdwaitaMono
        # - CaskaydiaCove
        - FiraCode
        - Hack
        - Inconsolata
        - JetBrainsMono
      google-fonts:
        - Roboto

  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          title: Flathub
        install:
          - io.github.kolunmi.Bazaar     # Bazaar
          - com.usebottles.bottles       # Bottles
          - com.brave.Browser            # Brave Browser
          - io.github.diegopvlk.Cine     # Cine
          - com.ranfdev.DistroShelf      # DistroShelf
          - com.github.tchx84.Flatseal   # Flatseal
          - org.mozilla.firefox           # Firefox
