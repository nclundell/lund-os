# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  # ============================================================================
  # DNF Module 1: Fedora Main Repos
  # Standard Fedora packages from default repositories
  # ============================================================================
  - type: dnf
    install:
      packages:
        # CLI Tools
        - atuin
        - bat
        - cabextract
        - fd-find
        - git-delta
        - glow
        - gh
        - ncmpcpp
        - neovim
        - p7zip
        - pandoc
        - shellcheck
        - sshfs
        - sqlite
        - tree-sitter-cli
        - w3m
        - zoxide
        # Icons
        - papirus-icon-theme
        - yaru-icon-theme
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # ============================================================================
  # Module 2: COPR Repositories
  # Community-maintained packages from COPR (ublue-os/packages, nclundell/fedora-extras)
  # ============================================================================
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
        - nclundell/fedora-extras
    install:
      packages:
        - bottom
        - eza
        - lazydocker
        - lazygit
        - resvg
        - starship
        - uupd
        - yazi

  # ============================================================================
  # Module 3: RPM Fusion Repository
  # Non-free packages from RPM Fusion (lame, mpd for audio)
  # ============================================================================
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      packages:
        - lame
        - mpd

  - type: fonts
    fonts:
      nerd-fonts:
        - AdwaitaMono
        # - CaskaydiaCove
        - FiraCode
        - Hack
        - Inconsolita
        - JetBrainsMono
      google-fonts:
        - Roboto

  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          title: Flathub (user)
      - scope: system
        notify: false
        repo:
          title: Flathub (system)
        install:
          - io.github.kolunmi.Bazaar     # Bazaar
          - com.usebottles.bottles       # Bottles
          - com.brave.Browser            # Brave Browser
          - io.github.diegopvlk.Cine     # Cine
          - com.ranfdev.DistroShelf      # DistroShelf
          - com.github.tchx84.Flatseal   # Flatseal
          - one.ablaze.floorp            # Floorp Browser
