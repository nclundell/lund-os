# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      packages:
        - atuin
        - cabextract
        - git
        - ImageMagick
        - neovim
        - p7zip
        - papirus-icon-theme
        - stow
        - ripgrep
        - steam-devices
        - unrar
        - unzip
        - yaru-icon-theme
        - zoxide
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: fonts
    fonts:
      nerd-fonts:
        - AdwaitaMono
        # - CaskaydiaCove
        - FiraCode
        - Hack
        - Inconsolata
        - JetBrainsMono
      google-fonts:
        - Roboto

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        repo:
          title: Flathub
        install:
          - com.usebottles.bottles              # Bottles
          - com.brave.Browser                   # Brave Browser
          - io.github.celluloid_player.Celluloid # Celluloid
          - com.ranfdev.DistroShelf             # DistroShelf
          - com.github.tchx84.Flatseal          # Flatseal
          - app.zen_browser.zen                 # Zen Browser
