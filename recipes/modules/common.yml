# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
        - nclundell/fedora-extras
    install:
      packages:
        # Base Tools
        - bash-completion
        - bat
        - btm
        - cabextract
        - curl
        - fd-find
        - fzf
        - git
        - imagemagick
        - jq
        - man-db
        - man-pages
        - mpd
        - ncmpcpp
        - neovim
        - openssh
        - openssl
        - p7zip
        - pandoc
        - poppler-utils
        - ripgrep
        - rust
        - shellcheck
        - sshfs
        - sqlite
        - stow
        - tmux
        - tree-sitter
        - unace
        - unrar
        - unzip
        - w3m
        - wget
        - xdg-user-dirs
        - xdg-utils
        - xz
        - zlib
        # Fonts
        - google-roboto-fonts
        # Icons
        - adwaita-icon-theme
        - breeze-icon-theme
        - papirus-icon-theme
        - yaru-icon-theme
        # Printer
        - avahi
        - bluez-cups
        - cups
        - cups-browsed
        - cups-filters
        - foomatic
        - foomatic-db
        - gutenprint-cups
        - nss-mdns
        # System
        - tuned
        - tuned-ppd
        - uupd
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: fonts
    fonts:
      nerd-fonts:
        - AdwaitaMono
        # - CaskaydiaCove
        - FiraCode
        - Hack
        - Inconsolata
        - JetBrainsMono

  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          title: Flathub (user)
      - scope: system
        notify: false
        repo:
          title: Flathub (system)
        install:
          - com.usebottles.bottles       # Bottles
          - io.github.kolunmi.Bazaar     # Bazaar Flatpak Manager
          - io.github.diegopvlk.Cine     # Cine
          - com.brave.Browser            # Brave Browser
          - com.ranfdev.DistroShelf      # DistroShelf
          - com.github.tchx84.Flatseal   # Flatseal
          - one.ablaze.floorp            # Floorp Browser
