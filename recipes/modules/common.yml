# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  # Module: Fedora Main Repos
  # Standard Fedora packages from default repositories
  - type: dnf
    install:
      packages:
        - autoconf
        - bzip2
        - gcc
        - git
        - make
        - ncmpcpp
        - neovim
        - papirus-icon-theme
        - patch
        - rust
        - stow
        - yaru-icon-theme
        # Development
        - gdbm-devel
        - libffi-devel
        - libyaml-devel
        - ncurses-devel
        - openssl-devel
        - perl-FindBin
        - readline-devel
        - zlib-ng-compat-devel
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # Module: COPR Repositories
  # Community packages from COPR (ublue-os/packages)
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
    install:
      packages:
        - ublue-motd
        - uupd

  # Module: RPM Fusion Repository
  # Non-free packages from RPM Fusion
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      packages:
        - lame
        - mpd

  # Module: Fonts
  # Nerd Fonts and Google Fonts
  - type: fonts
    fonts:
      nerd-fonts:
        - AdwaitaMono
        # - CaskaydiaCove
        - FiraCode
        - Hack
        - Inconsolata
        - JetBrainsMono
      google-fonts:
        - Roboto

  # Module: Default Flatpaks
  # Pre-installed Flatpak applications
  - type: default-flatpaks
    configurations:
      - scope: user
        notify: false
        repo:
          title: Flathub (user)
      - scope: system
        notify: false
        repo:
          title: Flathub (system)
        install:
          - io.github.kolunmi.Bazaar     # Bazaar
          - com.usebottles.bottles       # Bottles
          - com.brave.Browser            # Brave Browser
          - io.github.diegopvlk.Cine     # Cine
          - com.ranfdev.DistroShelf      # DistroShelf
          - com.github.tchx84.Flatseal   # Flatseal
          - org.mozilla.firefox           # Firefox
