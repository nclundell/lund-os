# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      packages:
        - abcde
        - autoconf
        - cabextract
        - cd-discid
        - curl
        - ddrescue
        - file
        - flac
        - gcc
        - gcc-c++
        - git
        - glibc-devel
        - ImageMagick
        - lame
        - libcdio-paranoia
        - libdiscid
        - libdvdcss
        - libffi-devel
        - libldac
        - libyaml-devel
        - make
        - mpd
        - mpdris2
        - ncmpcpp
        - openssl-devel
        - opus-tools
        - p7zip
        - papirus-icon-theme
        - patch
        - pkgconf-pkg-config
        - procps-ng
        - readline-devel
        - rust
        - steam-devices
        - unrar
        - unzip
        - vorbis-tools
        - yaru-icon-theme
        - zlib-ng-compat-devel
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        repo:
          title: Flathub
        install:
          - com.brave.Browser                    # Brave Browser
          - io.github.celluloid_player.Celluloid # Celluloid
          - com.ranfdev.DistroShelf              # DistroShelf
          - com.github.tchx84.Flatseal           # Flatseal
          - io.github.flattool.Warehouse         # Warehouse
