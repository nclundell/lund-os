# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: lund-os
description: This is my personal OS image.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest

modules:
  # Module: Common
  # Base packages, fonts, and flatpaks
  - from-file: modules/common.yml

  # Module: GNOME
  # GNOME desktop configuration
  - from-file: modules/gnome.yml

  # Module: Niri
  # Niri window manager configuration
  - from-file: modules/niri.yml

  # Module: Systemd Configuration
  # Disable default update timers
  - type: systemd
    system:
      disabled:
        - rpm-ostreed-automatic.timer
        - flatpak-system-update.timer

  # Module: Justfiles
  # Install just recipes for user convenience
  - type: justfiles
    install: true
  
  # Module: Files
  # Copy configuration files to system
  - type: files
    files:
      - source: etc 
        destination: /etc
      - source: lib
        destination: /usr/lib
      - source: share
        destination: /usr/share
      - source: etc/skel
        destination: /etc/skel

  # Module: OS Release
  # Customize /etc/os-release
  - type: os-release
    properties:
      NAME: lund-os
      ID: lund-os
      ID_LIKE: fedora
      PRETTY_NAME: LundOS (Custom Fedora Atomic)
      DEFAULT_HOSTNAME: lund-os
      HOME_URL: https://github.com/nclundell/lund-os

  # Module: Signing
  # Enable image signing for rebase
  - type: signing
